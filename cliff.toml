# git-cliff configuration for AINews
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}## {{ version }} ({{ timestamp | date(format="%Y-%m-%d") }}){% else %}## [Unreleased]{% endif %}
{% if previous.version %}**[Full diff](https://github.com/BingqiangZhou/AINews/compare/{{ previous.version }}...{{ version }})**{% endif %}
<!-- AI_SUMMARY -->
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first | trim }}\
{% if commit.breaking %} (**BREAKING**){% endif %}\
 ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/BingqiangZhou/AINews/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->🔨 Refactor" },
  { message = "^restore", group = "<!-- 3 -->🔄 Restore" },
  { message = "^harden", group = "<!-- 4 -->🛡️ Hardening" },
  { message = "^perf", group = "<!-- 5 -->⚡ Performance" },
  { message = "^doc", group = "<!-- 6 -->📝 Documentation" },
  { message = "^test", group = "<!-- 7 -->🧪 Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^ci", group = "<!-- 8 -->⚙️ Miscellaneous" },
  { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
  { message = "^cleanup", group = "<!-- 2 -->🔨 Refactor" },
  { message = "^refine", group = "<!-- 0 -->🚀 Features" },
  { message = "^improve", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^config", group = "<!-- 8 -->⚙️ Miscellaneous" },
  { message = "^Merge", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v\\d+"
sort_commits = "oldest"

[bump]
initial_tag = "0.0.1"
