name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${GITHUB_REF_NAME}"
          awk "/^## ${TAG}/{found=1} /^## / && found && !/^## ${TAG}/{exit} found{print}" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
